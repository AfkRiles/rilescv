    function useScrollY() {
      const [y, setY] = useState(0);
      useEffect(() => {
        const fn = () => setY(window.scrollY);
        window.addEventListener("scroll", fn, { passive: true });
        return () => window.removeEventListener("scroll", fn);
      }, []);
      return y;
    }

    function useInView(ref, threshold = 0.15) {
      const [inView, setInView] = useState(false);
      useEffect(() => {
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setInView(true); }, { threshold });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, [ref, threshold]);
      return inView;
    }

    function btnStyle(variant) {
      const base = { cursor: "pointer", fontFamily: "inherit", fontSize: 10, fontWeight: 700, letterSpacing: "0.15em", padding: "10px 20px", borderRadius: 4, transition: "all 0.2s" };
      if (variant === "solid") return { ...base, background: "#fff", color: "#fd2601", border: "none" };
      if (variant === "outline") return { ...base, background: "transparent", color: "#fff", border: "1.5px solid rgba(255,255,255,0.6)" };
      return { ...base, background: "transparent", color: "rgba(255,255,255,0.6)", border: "1px solid rgba(255,255,255,0.2)" };
    }

                    </button>
                    {isOpen && (
                      <div style={{ padding: "0 28px 28px", display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 12 }}>
                        {item.steps.map((s, j) => (
                          <div key={j} style={{ background: "rgba(255,255,255,0.06)", borderRadius: 8, padding: "16px 18px" }}>
                            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.14em", color: "rgba(255,255,255,0.5)", marginBottom: 6 }}>STEP {j + 1}</div>
                            <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", marginBottom: 6 }}>{s.step}</div>
                            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.7)", lineHeight: 1.6 }}>{s.desc}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </section>
      );
    }

                    )},
                    { label: "Email", href: `mailto:${COPY.email}`, icon: (
                      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    )},
                    { label: "LinkedIn", href: "https://www.linkedin.com/in/riley-watson-b7b32628b/", icon: (
                      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                    )},
                  ].map((s, i) => (
                    s.href ? (

    function App() {
      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(180deg, #fd2601 0%, #f37e1c 100%)", backgroundAttachment: "fixed" }}>

    const root = ReactDOM.createRoot(document.getElementById("root"));
