    function useScrollY() {
      const [y, setY] = useState(0);
      useEffect(() => {
        const fn = () => setY(window.scrollY);
        window.addEventListener("scroll", fn, { passive: true });
        return () => window.removeEventListener("scroll", fn);
      }, []);
      return y;
    }

    function useInView(ref, threshold = 0.15) {
      const [inView, setInView] = useState(false);
      useEffect(() => {
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setInView(true); }, { threshold });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, [ref, threshold]);
      return inView;
    }

      if (variant === "solid") return { ...base, background: "#fff", color: "#fd2601", border: "none" };
      if (variant === "outline") return { ...base, background: "transparent", color: "#fff", border: "1.5px solid rgba(255,255,255,0.6)" };
      return { ...base, background: "transparent", color: "rgba(255,255,255,0.6)", border: "1px solid rgba(255,255,255,0.2)" };
    }

                </div>
              ))}
            </div>

            {/* Links */}
            {c.links.length > 0 && (
              <div style={{ marginBottom: 28 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.16em", color: "rgba(255,255,255,0.6)", marginBottom: 12 }}>LINKS</div>
                {c.links.map((l, i) => (
                  <div key={i} style={{ marginBottom: 8 }}>
                    <a href={l.url} target="_blank" rel="noopener noreferrer" style={{ color: "#fff", fontSize: 13, opacity: 0.9, textDecoration: "none", display: "inline-flex", alignItems: "center", gap: 8, borderBottom: "1px solid rgba(255,255,255,0.3)", paddingBottom: 2 }}>
                      <span style={{ color: "rgba(255,255,255,0.5)" }}>✱</span>{l.label} ↗
                    </a>
                  </div>
                ))}
              </div>
            )}

            {/* References */}
            {c.references.length > 0 && (
              <div style={{ marginBottom: 28 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.16em", color: "rgba(255,255,255,0.6)", marginBottom: 12 }}>REFERENCES</div>
                {c.references.map((r, i) => (
                  <div key={i} style={{ marginBottom: 8 }}>
                    <a href={r.url} target="_blank" rel="noopener noreferrer" style={{ color: "#fff", fontSize: 13, opacity: 0.9, textDecoration: "none", display: "inline-flex", alignItems: "center", gap: 8, borderBottom: "1px solid rgba(255,255,255,0.3)", paddingBottom: 2 }}>
                      <span style={{ color: "rgba(255,255,255,0.5)" }}>✱</span>{r.label} ↗
                    </a>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    function CasesSection() {
      const [active, setActive] = useState(null);
      const ref = useRef(null);
      const inView = useInView(ref);
      return (
        <section id="cases" ref={ref} style={{ padding: "100px clamp(24px,6vw,100px)" }}>
          <div style={{ opacity: inView ? 1 : 0, transform: inView ? "translateY(0)" : "translateY(40px)", transition: "all 0.7s ease" }}>
            <SectionTitle>PAST WORK</SectionTitle>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 16 }}>
              {COPY.cases.map((c) => (
                <div key={c.id} onClick={() => setActive(c)} style={{ background: "rgba(255,255,255,0.08)", backdropFilter: "blur(12px)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 12, padding: "36px 28px", cursor: "pointer", transition: "transform 0.2s, background 0.2s" }}
                  onMouseEnter={(e) => { e.currentTarget.style.transform = "translateY(-6px)"; e.currentTarget.style.background = "rgba(255,255,255,0.14)"; }}
                  onMouseLeave={(e) => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.background = "rgba(255,255,255,0.08)"; }}>
                  <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.18em", color: "rgba(255,255,255,0.6)", marginBottom: 12 }}>{c.tag} · {c.year}</div>
                  <h3 style={{ fontFamily: "'Anton', Impact, sans-serif", fontSize: 36, color: "#fff", margin: "0 0 8px", letterSpacing: "0.04em" }}>{c.title}</h3>
                  <p style={{ color: "rgba(255,255,255,0.75)", fontSize: 13, margin: "0 0 24px", letterSpacing: "0.05em" }}>{c.subtitle}</p>
                  <div style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", color: "#fff", opacity: 0.8 }}>VIEW CASE <span>→</span></div>
                </div>
              ))}
            </div>
          </div>
          {active && <CaseModal c={active} onClose={() => setActive(null)} />}
        </section>
      );
    }

    function ExperienceSection() {
      const ref = useRef(null);
      const inView = useInView(ref);
      return (
        <section id="experience" ref={ref} style={{ padding: "100px clamp(24px,6vw,100px)" }}>
          <div style={{ opacity: inView ? 1 : 0, transform: inView ? "translateY(0)" : "translateY(40px)", transition: "all 0.7s ease" }}>
            <SectionTitle>EXPERIENCE</SectionTitle>
            <div style={{ position: "relative" }}>
              <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 2, background: "rgba(255,255,255,0.2)" }} className="timeline-line" />
              <div>
                {COPY.experience.map((exp, i) => (
                  <div key={i} style={{ marginBottom: 32, paddingLeft: 32, position: "relative", opacity: inView ? 1 : 0, transform: inView ? "translateX(0)" : "translateX(-20px)", transition: `all 0.6s ease ${i * 0.12}s` }}>
                    <div style={{ position: "absolute", left: -5, top: 20, width: 12, height: 12, borderRadius: "50%", background: "#fff", border: "2px solid #fd2601" }} />
                    <div style={{ background: "rgba(255,255,255,0.08)", backdropFilter: "blur(12px)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 12, padding: "28px" }}>
                      <div style={{ marginBottom: 16 }}>
                        <div style={{ fontFamily: "'Anton', Impact, sans-serif", fontSize: 24, color: "#fff", letterSpacing: "0.04em" }}>{exp.role}</div>
                        <div style={{ fontSize: 13, color: "rgba(255,255,255,0.7)", letterSpacing: "0.08em", marginTop: 2 }}>{exp.company}</div>
                      </div>
                      <ul style={{ margin: "0 0 16px", padding: "0 0 0 18px", listStyle: "disc" }}>
                        {exp.bullets.map((b, j) => (
                          <li key={j} style={{ color: "rgba(255,255,255,0.8)", fontSize: 13, lineHeight: 1.7 }}>{b}</li>
                        ))}
                      </ul>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                        {exp.tags.map((tag, j) => (
                          <span key={j} style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.14em", padding: "4px 10px", border: "1px solid rgba(255,255,255,0.3)", borderRadius: 100, color: "rgba(255,255,255,0.7)" }}>{tag}</span>
                        ))}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    function PlaybookSection() {
      const [open, setOpen] = useState(null);
      const ref = useRef(null);
      const inView = useInView(ref);
      return (
        <section id="playbook" ref={ref} style={{ padding: "100px clamp(24px,6vw,100px)" }}>
          <div style={{ opacity: inView ? 1 : 0, transform: inView ? "translateY(0)" : "translateY(40px)", transition: "all 0.7s ease" }}>
            <SectionTitle>MY PROCESS</SectionTitle>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {COPY.playbook.map((item, i) => {
                const isOpen = open === i;
                return (
                  <div key={i} style={{ background: "rgba(255,255,255,0.08)", backdropFilter: "blur(12px)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 12, overflow: "hidden" }}>
                    <button onClick={() => setOpen(isOpen ? null : i)} style={{ width: "100%", padding: "24px 28px", background: "none", border: "none", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", color: "#fff", fontFamily: "'Anton', Impact, sans-serif", fontSize: 22, letterSpacing: "0.06em" }}>
                      <span style={{ display: "flex", alignItems: "center", gap: 16 }}>
                        <span style={{ fontSize: 13, color: "rgba(255,255,255,0.4)" }}>0{i + 1}</span>{item.title}
                      </span>
                      <span style={{ fontSize: 20, transition: "transform 0.3s", transform: isOpen ? "rotate(45deg)" : "rotate(0)" }}>+</span>
                    </button>
                    {isOpen && (
                      <div style={{ padding: "0 28px 28px", display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 12 }}>
                        {item.steps.map((s, j) => (
                          <div key={j} style={{ background: "rgba(255,255,255,0.06)", borderRadius: 8, padding: "16px 18px" }}>
                            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.14em", color: "rgba(255,255,255,0.5)", marginBottom: 6 }}>STEP {j + 1}</div>
                            <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", marginBottom: 6 }}>{s.step}</div>
                            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.7)", lineHeight: 1.6 }}>{s.desc}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </section>
      );
    }

    function ContactSection() {
      const [copied, setCopied] = useState(false);
      const [urlCopied, setUrlCopied] = useState(false);
      const ref = useRef(null);
      const inView = useInView(ref);
      const copyEmail = () => { navigator.clipboard.writeText(COPY.email).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2500); }); };
      const shareCV = () => { navigator.clipboard.writeText(window.location.href).then(() => { setUrlCopied(true); setTimeout(() => setUrlCopied(false), 2500); }); };
      return (
        <section id="contact" ref={ref} style={{ padding: "100px clamp(24px,6vw,100px) 80px" }}>
          <div style={{ opacity: inView ? 1 : 0, transform: inView ? "translateY(0)" : "translateY(40px)", transition: "all 0.7s ease" }}>
            <SectionTitle>LET'S TALK</SectionTitle>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 48, maxWidth: 800 }} className="contact-grid">
              <div>
                <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.2em", color: "rgba(255,255,255,0.5)", marginBottom: 14 }}>CONTACT ME ON SOCIALS</div>
                {[
                  { label: "X / TWITTER", value: "nftriles", href: "https://x.com/nftriles" },
                  { label: "TELEGRAM", value: "nftriles", href: "https://t.me/nftriles" },
                  { label: "DISCORD", value: "nftriles", href: null },
                ].map((s, i) => (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, paddingBottom: 12, borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
                    <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.16em", color: "rgba(255,255,255,0.45)" }}>{s.label}</span>
                    {s.href ? (
                      <a href={s.href} target="_blank" rel="noopener noreferrer" style={{ color: "#fff", fontSize: 13, fontWeight: 600, textDecoration: "none", opacity: 0.9 }}>{s.value}</a>
                    ) : (
                      <span style={{ color: "#fff", fontSize: 13, fontWeight: 600, opacity: 0.9 }}>{s.value}</span>
                    )}
                  </div>
                ))}
                <div style={{ marginTop: 20 }}>
                  {[
                    { label: "EMAIL", value: COPY.email, href: `mailto:${COPY.email}` },
                    { label: "LOCATION", value: COPY.location, href: null },
                  ].map((item, i) => (
                    <div key={i} style={{ marginBottom: 20, paddingBottom: 20, borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
                      <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.2em", color: "rgba(255,255,255,0.5)", marginBottom: 4 }}>{item.label}</div>
                      {item.href ? (
                        <a href={item.href} style={{ color: "#fff", fontSize: 14, fontWeight: 600, textDecoration: "none", opacity: 0.9 }}>{item.value}</a>
                      ) : (
                        <span style={{ color: "#fff", fontSize: 14, fontWeight: 600 }}>{item.value}</span>
                      )}
                    </div>
                  ))}
                </div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <a href={`mailto:${COPY.email}`} style={{ ...btnStyle("solid"), textDecoration: "none", textAlign: "center", display: "block" }}>EMAIL ME</a>
                <a href="https://calendly.com/nftriles/30minute" target="_blank" rel="noopener noreferrer" style={{ ...btnStyle("outline"), textDecoration: "none", textAlign: "center", display: "block" }}>BOOK A CALL</a>
                <button onClick={shareCV} style={{ ...btnStyle("outline"), textAlign: "center", width: "100%" }}>
                  {urlCopied ? "✓ LINK COPIED" : "SHARE CV"}
                </button>
                <button onClick={copyEmail} style={{ background: copied ? "#fff" : "rgba(255,255,255,0.12)", color: copied ? "#fd2601" : "#fff", border: "1.5px solid rgba(255,255,255,0.4)", padding: "10px 20px", borderRadius: 6, cursor: "pointer", fontSize: 10, fontWeight: 700, letterSpacing: "0.14em", fontFamily: "inherit", transition: "all 0.25s", width: "100%" }}>
                  {copied ? "✓ COPIED" : "COPY EMAIL"}
                </button>
              </div>
            </div>
          </div>
          <div style={{ marginTop: 80, paddingTop: 24, borderTop: "1px solid rgba(255,255,255,0.1)", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
            <span style={{ fontFamily: "'Anton', Impact, sans-serif", fontSize: 18, color: "rgba(255,255,255,0.5)", letterSpacing: "0.1em" }}>RILES WEB3 CV</span>
            <span style={{ fontSize: 10, color: "rgba(255,255,255,0.35)", letterSpacing: "0.1em" }}>RILEY WATSON · GROWTH / MARKETING / BD / SOCIAL</span>
          </div>
        </section>
      );
    }

    function App() {
      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(180deg, #fd2601 0%, #f37e1c 100%)", backgroundAttachment: "fixed" }}>
          <Navbar />
          <HeroSection />
          <ImpactSection />
          <CasesSection />
          <ExperienceSection />
          <PlaybookSection />
          <ContactSection />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
